<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriPass - Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-bg">

    <div id="header-placeholder"></div>

    <main class="dashboard-container">
        
        <div class="summary-cards animate-on-load">
            <div class="summary-card card-submitted">
                <h4>Submitted</h4>
                <h2>0</h2>
            </div>
            <div class="summary-card card-approved">
                <h4>Approved</h4>
                <h2>0</h2>
            </div>
            <div class="summary-card card-pending">
                <h4>Pending</h4>
                <h2>0</h2>
            </div>
            <div class="summary-card card-rejected">
                <h4>Rejected</h4>
                <h2>0</h2>
            </div>
        </div>

        <div class="table-container animate-on-load">
            <table class="status-table">
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Est. Waiting Time</th>
                        <th>Submission Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="student-docs-body">
                    
                </tbody>
            </table>
        </div>

    </main>

    <footer class="dash-footer">
        <p>VeriPass &copy; 2026. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
