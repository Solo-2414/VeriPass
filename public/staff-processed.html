<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriPass - Processed Documents</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-bg">

    <div id="header-placeholder"></div>

    <main class="dashboard-container">
        
        <div class="upload-page-header animate-on-load">
            <h2 class="upload-page-title">Processed History</h2>
            
            <div class="header-controls">
                <div class="search-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" class="search-bar" placeholder="Search by ID or Name">
                </div>
                <select class="filter-dropdown">
                    <option value="" disabled selected>Filter Status</option>
                    <option value="valid">Valid (Approved)</option>
                    <option value="incomplete">Incomplete</option>
                    <option value="missing">Missing</option>
                </select>
            </div>
        </div>

        <div class="table-container animate-on-load">
            <table class="status-table">
                <thead>
                    <tr>
                        <th>Transaction ID</th>
                        <th>Student Name</th>
                        <th>Document Type</th>
                        <th>Completed At</th>
                        <th>Final Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>#1039</td>
                        <td>Alice Johnson</td>
                        <td>Academic Requirements</td>
                        <td>Yesterday, 4:30 PM</td>
                        <td class="text-green">Valid</td>
                        <td><button class="btn-outline-purple">View Record</button></td>
                    </tr>
                    <tr>
                        <td>#1038</td>
                        <td>Bob Williams</td>
                        <td>OJT Requirements</td>
                        <td>Yesterday, 2:15 PM</td>
                        <td class="text-red">Incomplete</td>
                        <td><button class="btn-outline-purple">View Record</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <footer class="dash-footer">
        <p>VeriPass &copy; 2026. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
