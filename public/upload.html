<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriPass - Upload Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-bg">

    <div id="header-placeholder"></div>

    <main class="dashboard-container">
        
        <div class="upload-page-header animate-on-load">
            <h2 class="upload-page-title">Document Upload Form</h2>
            <div class="search-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" class="search-bar" placeholder="Search">
            </div>
        </div>

        <div class="drafts-carousel animate-on-load">
            <div class="draft-card">
                <div class="draft-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#4A72A4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
                </div>
                <div class="draft-text">OJT APPLICATION<br>DRAFT</div>
            </div>
            <div class="draft-card">
                <div class="draft-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#4A72A4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
                </div>
                <div class="draft-text">OJT APPLICATION<br>DRAFT</div>
            </div>
            <div class="draft-card">
                <div class="draft-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#4A72A4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
                </div>
                <div class="draft-text">OJT APPLICATION<br>DRAFT</div>
            </div>
            <div class="draft-card">
                <div class="draft-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#4A72A4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
                </div>
                <div class="draft-text">OJT APPLICATION<br>DRAFT</div>
            </div>
            <div class="draft-card">
                <div class="draft-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#4A72A4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
                </div>
                <div class="draft-text">OJT APPLICATION<br>DRAFT</div>
            </div>
            <div class="draft-card">
                <div class="draft-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#4A72A4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
                </div>
                <div class="draft-text">OJT APPLICATION<br>DRAFT</div>
            </div>
        </div>

        <div class="upload-card-full animate-on-load">
            <form id="file-upload-form">
                
                <div class="form-group">
                    <label for="doc-type">Document Type</label>
                    <select id="doc-type" required>
                        <option value="" disabled selected></option>
                        <option value="ojt">OJT Requirements</option>
                        <option value="org">Organizational Papers</option>
                        <option value="academic">Academic Requirements</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="department">Department</label>
                    <select id="department" required>
                        <option value="" disabled selected></option>
                        <option value="cics">CICS</option>
                        <option value="cba">CBA</option>
                        <option value="engineering">Engineering</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="section">Section</label>
                    <select id="section" required>
                        <option value="" disabled selected></option>
                        <option value="2208">2208</option>
                        <option value="2209">2209</option>
                    </select>
                </div>

                <div class="form-group" style="margin-top: 40px;">
                    <label class="drop-zone" for="file-upload">
                        <div class="drop-zone-icon">📁</div>
                        <div class="drop-zone-text">Drag & drop files or Browse</div>
                        <div class="drop-zone-subtext">Supported formats: PDF, DOCX, JPEG</div>
                        <input type="file" id="file-upload" class="hidden-file-input" required>
                    </label>
                </div>

                <button type="submit" class="submit-btn">Submit Document</button>
            </form>
        </div>

    </main>

    <footer class="dash-footer">
        <p>Copyright Text</p>
    </footer>

    <div class="modal-overlay" id="success-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal">&times;</button>
            <h2 style="margin-bottom: 10px; color: #333;">Submitted the File</h2>
            <p style="color: #666; font-size: 0.95rem;">You have submitted the file. Please wait for further notification regarding your request.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
