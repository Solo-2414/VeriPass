<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriPass - System Logs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-bg">

    <div id="header-placeholder"></div>

    <main class="dashboard-container">
        
        <div class="upload-page-header animate-on-load">
            <h2 class="upload-page-title">Master Audit Trail</h2>
            <div class="header-controls">
                <div class="search-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="log-search" class="search-bar" placeholder="Search by Staff, Student, or ID...">
                </div>
            </div>
        </div>

        <div class="table-container animate-on-load">
            <table class="status-table">
                <thead>
                    <tr>
                        <th>Trans. ID</th>
                        <th>Student</th>
                        <th>Document</th>
                        <th>Handled By (Staff)</th>
                        <th>Timestamp</th>
                        <th>Final Status</th>
                    </tr>
                </thead>
                <tbody id="admin-logs-body">
                    </tbody>
            </table>
        </div>

    </main>

    <footer class="dash-footer">
        <p>VeriPass &copy; 2026. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
