<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriPass - My Documents</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-bg">

    <div id="header-placeholder"></div>

    <main class="dashboard-container">
        
        <div class="upload-page-header animate-on-load">
            <h2 class="upload-page-title">My Documents</h2>
            
            <div class="header-controls">
                <div class="search-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="doc-search" class="search-bar" placeholder="Search document name...">
                </div>
                <select id="doc-filter" class="filter-dropdown">
                    <option value="" selected>All Statuses</option>
                    <option value="processing">Processing / Submitted</option>
                    <option value="valid">Approved</option>
                    <option value="incomplete">Rejected / Missing</option>
                </select>
            </div>
        </div>

        <div class="table-container animate-on-load">
            <table class="status-table">
                <thead>
                    <tr>
                        <th>Document Name</th>
                        <th>Est. Waiting Time</th>
                        <th>Submission Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="all-documents-body">
                    
                </tbody>
            </table>
        </div>

    </main>

    <footer class="dash-footer">
        <p>VeriPass &copy; 2026. All rights reserved.</p>
    </footer>

    <div class="modal-overlay" id="details-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-details-modal">&times;</button>
            <h2 class="modal-title">Document Details</h2>
            <p><strong>Status Remarks:</strong> Please review your document.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
